<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>資料清洗儀表板</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; }

    /* ── Navbar ── */
    .top-nav {
      background: linear-gradient(135deg, #1e40af, #4f46e5);
      padding: .75rem 1.5rem; display: flex; align-items: center; gap: .75rem;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(79,70,229,.4);
    }
    .top-nav .brand   { color: #fff; font-weight: 800; font-size: 1.05rem; }
    .top-nav .sub     { color: rgba(255,255,255,.6); font-size: .75rem; }
    .live-pill {
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
      color: #fff; font-size: .7rem; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; display: flex; align-items: center; gap: .4rem; letter-spacing: .05em;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80;
           animation: blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }

    /* 連線異常徽章 */
    #conn-err {
      display: none; background: #dc2626; color: #fff;
      font-size: .7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px;
      animation: errBlink 1s ease-in-out infinite;
    }
    @keyframes errBlink { 0%,100%{opacity:1;} 50%{opacity:.5;} }

    /* ── Stats bar ── */
    .stats-bar {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: .5rem 1.5rem; display: flex; gap: 2rem; flex-wrap: wrap;
      font-size: .78rem; align-items: center;
    }
    .stats-bar .item { display: flex; align-items: center; gap: .4rem; color: #64748b; }
    .stats-bar .num  { font-weight: 800; font-size: .95rem; color: #1e293b; font-family: monospace; }
    #stat-pii { color: #dc2626; }
    .level-indicator {
      margin-left: auto; font-size: .72rem; font-weight: 700;
      padding: 3px 12px; border-radius: 20px;
    }
    .lv1 { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .lv2 { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }

    /* ── PII badges ── */
    .pii-badge {
      font-size: .62rem; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; padding: 2px 7px; border-radius: 20px; line-height: 1.6;
    }
    .badge-phone { background:#fff7ed; color:#c2410c; border:1px solid #fed7aa; }
    .badge-email { background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; }
    .badge-line  { background:#f5f3ff; color:#6d28d9; border:1px solid #ddd6fe; }
    .badge-html  { background:#fffbeb; color:#b45309; border:1px solid #fde68a; }
    .badge-clean { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
    .badge-flag  {
      background: linear-gradient(90deg,#7c3aed,#db2777); color:#fff;
      border:none; animation: flagPulse .9s ease-in-out infinite alternate;
    }
    @keyframes flagPulse {
      from { box-shadow: 0 0 4px rgba(219,39,119,.4); }
      to   { box-shadow: 0 0 12px rgba(124,58,237,.8); }
    }

    /* Level tag on card */
    .lv-tag {
      font-size: .62rem; font-weight: 700; padding: 1px 7px; border-radius: 4px;
    }
    .lv-tag.lv1 { background:#dcfce7; color:#15803d; }
    .lv-tag.lv2 { background:#ffedd5; color:#c2410c; }

    /* ── Feed ── */
    .feed-wrap { max-width: 820px; margin: 1.5rem auto; padding: 0 1rem; }

    /* ── Message card ── */
    .msg-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 14px;
      overflow: hidden; margin-bottom: .85rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      transition: box-shadow .2s, transform .15s;
      animation: slideIn .35s cubic-bezier(.22,.68,0,1.15) both;
    }
    .msg-card.lv2-card { border-color: #fed7aa; }
    .msg-card:hover { box-shadow: 0 6px 20px rgba(99,102,241,.12); transform: translateY(-2px); }
    @keyframes slideIn {
      from { opacity:0; transform: translateY(-16px) scale(.98); }
      to   { opacity:1; transform: none; }
    }

    .card-head {
      padding: .6rem 1.1rem; background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
    }
    .msg-seq { font-family: monospace; font-size: .7rem; font-weight: 700;
               background: #e2e8f0; color: #475569; border-radius: 4px; padding: 1px 7px; }
    .ts-label { font-size: .7rem; color: #94a3b8; margin-left: auto; font-family: monospace; }

    /* Before / After panels */
    .panels { display: grid; grid-template-columns: 1fr 1fr; }
    @media (max-width: 600px) { .panels { grid-template-columns: 1fr; } }
    .panel { padding: .9rem 1.1rem; }
    .panel-raw     { background: #fffbf0; border-right: 1px solid #e2e8f0; }
    .panel-cleaned { background: #f0fdf4; }
    .panel-label {
      font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
      margin-bottom: .45rem; display: flex; align-items: center; gap: .3rem;
    }
    .panel-raw .panel-label     { color: #b45309; }
    .panel-cleaned .panel-label { color: #166534; }
    .panel-text {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: .8rem; line-height: 1.7; color: #334155; word-break: break-all;
    }

    /* *** 高亮 */
    .redacted { background: #fecaca; color: #b91c1c; border-radius: 3px; padding: 0 3px; font-weight: 700; }
    /* 雜訊高亮 */
    .noise { color: #f97316; font-weight: 700; }
    /* HTML 標籤高亮（Level 2）*/
    .html-tag { color: #dc2626; background: #fee2e2; border-radius: 3px; padding: 0 3px; font-weight: 700; font-family: monospace; font-size: .75rem; }

    /* ── Empty / error ── */
    .feed-msg { text-align:center; padding:3.5rem; color:#94a3b8; font-size:.9rem;
                background:#fff; border-radius:14px; border:1px solid #e2e8f0; }
    .feed-msg.error { color:#dc2626; background:#fff5f5; border-color:#fecaca; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="top-nav">
  <div>
    <div class="brand">🛡️ 資料清洗儀表板</div>
    <div class="sub">Flask + Python RE · Port 5001</div>
  </div>
  <div class="live-pill"><span class="dot"></span>LIVE</div>
  <span id="conn-err">⚠ 連線異常，重試中...</span>
</nav>

<!-- Stats bar -->
<div class="stats-bar">
  <div class="item">📨 已處理 <span class="num" id="stat-total">0</span> 筆</div>
  <div class="item">🚨 攔截個資 <span class="num" id="stat-pii">0</span> 件</div>
  <div class="item" id="badge-row"></div>
  <div class="item">
    下次更新 <span class="num" id="stat-next" style="font-size:.8rem; color:#6366f1;">—</span>
  </div>
  <span class="level-indicator lv1" id="level-tag">Level 1</span>
</div>

<!-- Feed -->
<div class="feed-wrap">
  <div id="feed">
    <div class="feed-msg" id="loading">⏳ 連線中，等待第一批資料…</div>
  </div>
</div>

<script>
  let totalMsgs = 0, totalPii = 0;
  const piiCounts = { PHONE:0, EMAIL:0, LINE:0, HTML:0, FLAG:0 };

  // ── Deduplication：用 UUID 去重（對應 mock_server 的 uuid4 id）──
  const seenIds = new Set();

  const BADGE_ICON  = { PHONE:'📞', EMAIL:'✉️', LINE:'💬', HTML:'🏷️', FLAG:'🚩' };
  const BADGE_CLASS = { PHONE:'badge-phone', EMAIL:'badge-email', LINE:'badge-line', HTML:'badge-html', FLAG:'badge-flag' };

  // ── HTML 工具 ──
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function now() {
    return new Date().toLocaleTimeString('zh-Hant', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }

  // ── Raw text 渲染：雜訊橘色、HTML 標籤紅色高亮 ──
  function renderRaw(text) {
    let s = esc(text);
    // HTML 標籤（Level 2）
    s = s.replace(/(&lt;[^&]*&gt;)/g, '<span class="html-tag">$1</span>');
    // 連續特殊符號（雜訊）
    s = s.replace(/((?:[^\w\u4e00-\u9fff，。？！、\s]){2,})/g, '<span class="noise">$1</span>');
    return s;
  }

  // ── Cleaned text 渲染：*** 紅底高亮 ──
  function renderCleaned(text) {
    return esc(text).replace(/\*{3}/g, '<span class="redacted">***</span>');
  }

  // ── 建立 Card ──
  function buildCard(msg, animDelay) {
    const labels  = msg.pii_labels || [];
    const isLv2   = msg.level === 2;

    const badgeHTML = labels.length
      ? labels.map(l => `<span class="pii-badge ${BADGE_CLASS[l]}">${BADGE_ICON[l]} ${l}</span>`).join(' ')
      : '<span class="pii-badge badge-clean">✅ 無個資</span>';

    const card = document.createElement('div');
    card.className = 'msg-card' + (isLv2 ? ' lv2-card' : '');
    card.style.animationDelay = `${animDelay * 0.06}s`;
    card.innerHTML = `
      <div class="card-head">
        <span class="msg-seq">#${esc(String(msg.id).slice(0, 8))}…</span>
        <span class="lv-tag lv${msg.level}">Lv${msg.level}</span>
        ${badgeHTML}
        <span class="ts-label">${now()}</span>
      </div>
      <div class="panels">
        <div class="panel panel-raw">
          <div class="panel-label">🔴 Raw（原始）</div>
          <div class="panel-text">${renderRaw(msg.raw_text)}</div>
        </div>
        <div class="panel panel-cleaned">
          <div class="panel-label">🟢 Cleaned（清洗後）</div>
          <div class="panel-text">${renderCleaned(msg.cleaned_text)}</div>
        </div>
      </div>`;
    return card;
  }

  // ── 更新統計列 ──
  function updateStats() {
    document.getElementById('stat-total').textContent = totalMsgs;
    document.getElementById('stat-pii').textContent   = totalPii;
    const row = document.getElementById('badge-row');
    row.innerHTML = Object.entries(piiCounts)
      .filter(([,v]) => v > 0)
      .map(([l,v]) => `<span class="pii-badge ${BADGE_CLASS[l]} me-1">${l} ×${v}</span>`)
      .join('');
  }

  // ── 連線狀態 ──
  function connOk()   { document.getElementById('conn-err').style.display = 'none'; }
  function connFail() { document.getElementById('conn-err').style.display = 'inline-block'; }

  // ── 主 fetch 函式 ──
  async function fetchFeed() {
    try {
      const res = await fetch('/api/feed');

      // Graceful Degradation
      if (!res.ok) { connFail(); scheduleNext(); return; }

      const data = await res.json();
      if (data.status !== 'success') { connFail(); scheduleNext(); return; }
      connOk();

      // 更新 Level 指示器
      const lv = data.level ?? 1;
      const lvTag = document.getElementById('level-tag');
      lvTag.textContent = `Level ${lv}`;
      lvTag.className = `level-indicator lv${lv}`;

      document.getElementById('loading')?.remove();

      const feed = document.getElementById('feed');
      const msgs = data.messages || [];

      // ── Dedup：過濾已渲染的 UUID ──
      const newMsgs = msgs.filter(m => !seenIds.has(m.id));
      newMsgs.forEach(m => seenIds.add(m.id));

      for (let i = newMsgs.length - 1; i >= 0; i--) {
        feed.prepend(buildCard(newMsgs[i], newMsgs.length - 1 - i));
        totalMsgs++;
        const labels = newMsgs[i].pii_labels || [];
        totalPii += labels.length;
        labels.forEach(l => { if (piiCounts[l] !== undefined) piiCounts[l]++; });
      }

      // 上限 40 張
      const cards = feed.querySelectorAll('.msg-card');
      if (cards.length > 40) for (let i = 40; i < cards.length; i++) cards[i].remove();

      updateStats();

    } catch (e) {
      connFail();
    }

    scheduleNext();
  }

  function scheduleNext() {
    const delay = 4000 + Math.random() * 3000;
    let tick = Math.round(delay / 1000);
    const el = document.getElementById('stat-next');
    const timer = setInterval(() => {
      if (!el) { clearInterval(timer); return; }
      el.textContent = tick + 's';
      if (--tick < 0) clearInterval(timer);
    }, 1000);
    setTimeout(fetchFeed, delay);
  }

  fetchFeed();
</script>
</body>
</html>
