{% extends "base.html" %}
{% set is_api_page = True %}

{% block title %}Interactive Reading Hub{% endblock %}

{% block extra_head %}
<style>
body {
    background-color: #fcfcfc;
    color: #111;
}

.article-container {
    max-width: 700px;
    margin: 80px auto;
    padding: 0 24px;
}

.article-title {
    font-family: "Georgia", serif;
    font-size: 3rem;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 32px;
}

.article-body {
    font-size: 1.25rem;
    line-height: 1.8;
    color: #333;
    font-family: "Georgia", serif;
    margin-bottom: 60px;
}

/* Functional Comment Section */
.discussion-section {
    border-top: 1px solid #eaeaea;
    padding-top: 40px;
}

.discussion-header {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.comment-input-area {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 40px;
}

.comment-textarea {
    width: 100%;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 16px;
    font-family: inherit;
    font-size: 1rem;
    resize: vertical;
    min-height: 100px;
    outline: none;
}
.comment-textarea:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,0.1); }

.comment-btn {
    align-self: flex-end;
    background: #0071e3;
    color: white;
    font-weight: 600;
    border: none;
    padding: 10px 24px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.2s;
}
.comment-btn:hover { background: #005bb5; }

.thread-list {
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.comment-card {
    background: #f5f5f7;
    border-radius: 12px;
    padding: 20px;
    animation: slideDown 0.3s ease;
}

@keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

.comment-author {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 8px;
    color: #111;
}

.comment-text {
    font-size: 0.95rem;
    line-height: 1.5;
    color: #444;
}
</style>
{% endblock %}

{% block content %}
<div class="article-container">
    <h1 class="article-title">{{ data.title|title }}</h1>
    
    <div class="article-body">
        <p>{{ data.body|capitalize }}</p>
    </div>
    
    <div class="discussion-section">
        <div class="discussion-header">
            <span>Discussion <span id="commentCount" style="color:#888; font-weight:400;">(0)</span></span>
            <button class="comment-btn" style="background:#f0f0f0; color:#111;" onclick="fetchExternalComments()">Load Web Comments</button>
        </div>
        
        <div class="comment-input-area">
            <textarea id="myComment" class="comment-textarea" placeholder="What are your thoughts on this post?"></textarea>
            <button class="comment-btn" onclick="postComment()">Submit Response</button>
        </div>
        
        <div class="thread-list" id="threadList">
            <!-- Comments injected here -->
        </div>
    </div>
</div>

<script>
    const apiData = {{ json_str | safe }};
    const list = document.getElementById('threadList');
    const countEl = document.getElementById('commentCount');
    let postId = apiData.id;
    let commentCount = 0;
    
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const randId = Math.floor(Math.random() * 100) + 1;
            const res = await fetch(`https://jsonplaceholder.typicode.com/posts/${randId}`);
            const data = await res.json();
            
            document.querySelector('.article-title').innerText = data.title;
            document.querySelector('.article-body p').innerText = data.body.charAt(0).toUpperCase() + data.body.slice(1);
            
            postId = data.id;
            
            const jsonOverlay = document.querySelector('.json-body pre');
            if (jsonOverlay) {
                jsonOverlay.innerText = JSON.stringify(data, null, 2);
            }
        } catch (e) {
            console.error("Fetch failed", e);
        }
    });
    
    function addCommentToDOM(author, body, isOwn = false) {
        const div = document.createElement('div');
        div.className = 'comment-card';
        if (isOwn) div.style.borderLeft = "4px solid #0071e3";
        
        div.innerHTML = `
            <div class="comment-author">${author} ${isOwn ? '<span style="color:#0071e3; font-size:0.8rem; margin-left:8px;">You</span>' : ''}</div>
            <div class="comment-text">${body}</div>
        `;
        list.prepend(div);
        commentCount++;
        countEl.innerText = `(${commentCount})`;
    }

    function postComment() {
        const text = document.getElementById('myComment').value;
        if (!text.trim()) return;
        addCommentToDOM("Guest User", text, true);
        document.getElementById('myComment').value = '';
    }
    
    // Feature to actually fetch from JSONPlaceholder comments endpoint
    async function fetchExternalComments() {
        if (!postId) return;
        try {
            const btn = event.target;
            btn.innerText = "Loading...";
            const res = await fetch(`https://jsonplaceholder.typicode.com/posts/${postId}/comments`);
            const comments = await res.json();
            
            comments.slice(0, 3).forEach(c => {
                addCommentToDOM(c.name, c.body);
            });
            btn.style.display = 'none'; // hide after loading
        } catch (e) {
            console.error(e);
            alert("Failed to load comments.");
        }
    }
</script>
{% endblock %}
