{% extends "base.html" %}
{% set is_api_page = True %}

{% block title %}Pokedex OS v2.0 Interactive{% endblock %}

{% block extra_head %}
<style>
body {
    background-color: #cd2834; /* Pokedex Red */
    color: #fff;
    overflow: hidden;
    height: 100vh;
    font-family: 'Inter', sans-serif;
    margin: 0;
}

/* Background Tech Pattern */
body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: 
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 1;
}

.pokedex-layout {
    display: flex;
    flex-wrap: wrap;
    min-height: 100vh;
    position: relative;
    z-index: 2;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 40px 20px;
    box-sizing: border-box;
}

/* Screen Left */
.main-screen {
    width: 100%;
    max-width: 450px;
    aspect-ratio: 1 / 1;
    background: #fdfdfd;
    border-radius: 24px 24px 24px 64px;
    border: 16px solid #e5e5e5;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4), inset 0 0 20px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: background 0.5s ease;
}

.main-screen.shiny-mode {
    background: #ffeeb2;
}

.pokemon-img {
    width: 75%;
    height: 75%;
    object-fit: contain;
    filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3));
    z-index: 2;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.pokemon-img:hover {
    transform: scale(1.1) translateY(-10px);
}

/* Info Right */
.info-panel {
    width: 100%;
    max-width: 450px;
    background: #222;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 2px solid #333;
}

.dex-number {
    font-family: 'SFMono-Regular', monospace;
    color: #4ade80;
    font-size: 1.2rem;
    margin-bottom: 8px;
}

.pokemon-name {
    font-size: min(2.5rem, 8vw);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 32px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 16px;
}

.stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 32px;
}

.stat-box {
    background: #111;
    border-radius: 12px;
    padding: 16px;
    border: 1px solid #333;
}

.stat-box label {
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 4px;
    letter-spacing: 0.1em;
}

.stat-box span {
    font-size: 1.5rem;
    font-weight: 600;
    color: #fff;
}

/* Interactive Controls */
.controls {
    display: flex;
    gap: 16px;
}

.btn {
    flex: 1;
    padding: 14px 24px;
    border-radius: 12px;
    border: none;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    font-family: inherit;
}

.btn-play {
    background: #3b82f6;
    color: white;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
}
.btn-play:hover { background: #2563eb; transform: translateY(-2px); }
.btn-play:active { transform: translateY(0); }

.btn-shiny {
    background: #eab308;
    color: #000;
    box-shadow: 0 4px 15px rgba(234, 179, 8, 0.4);
}
.btn-shiny:hover { background: #ca8a04; transform: translateY(-2px); }
.btn-shiny:active { transform: translateY(0); }

</style>
{% endblock %}

{% block content %}
<div class="pokedex-layout">
    <div class="main-screen" id="screenBg">
        <img src="{{ data.sprites.other['official-artwork'].front_default if data.sprites else '' }}" id="pokeSprite" class="pokemon-img">
    </div>
    
    <div class="info-panel">
        <div class="dex-number">No. {{ '{:03d}'.format(data.id) }}</div>
        <div class="pokemon-name">
            {{ data.name }}
        </div>
        
        <div class="stat-grid">
            <div class="stat-box">
                <label>Height</label>
                <span>{{ data.height / 10 }} m</span>
            </div>
            <div class="stat-box">
                <label>Weight</label>
                <span>{{ data.weight / 10 }} kg</span>
            </div>
        </div>
        
        <!-- Interactive Controls -->
        <div class="controls">
            <button class="btn btn-play" onclick="playCry()">
                <i data-feather="volume-2"></i> Play Cry
            </button>
            <button class="btn btn-shiny" onclick="toggleShiny()">
                <i data-feather="star"></i> Shiny Toggle
            </button>
        </div>
    </div>
</div>

<script>
    let apiData = {{ json_str | safe }};
    let audio = null;
    let normalSprite = apiData.sprites?.other['official-artwork']?.front_default;
    let shinySprite = apiData.sprites?.other['official-artwork']?.front_shiny;
    let isShiny = false;
    
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const randId = Math.floor(Math.random() * 898) + 1;
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${randId}`);
            apiData = await res.json();
            
            // Update UI
            document.querySelector('.dex-number').innerText = `No. ${String(apiData.id).padStart(3, '0')}`;
            document.querySelector('.pokemon-name').innerText = apiData.name;
            document.querySelectorAll('.stat-grid span')[0].innerText = (apiData.height / 10) + ' m';
            document.querySelectorAll('.stat-grid span')[1].innerText = (apiData.weight / 10) + ' kg';
            
            normalSprite = apiData.sprites?.other['official-artwork']?.front_default;
            shinySprite = apiData.sprites?.other['official-artwork']?.front_shiny;
            document.getElementById('pokeSprite').src = normalSprite;
            
            isShiny = false;
            document.getElementById('screenBg').classList.remove('shiny-mode');
            
            const cryUrl = apiData.cries?.latest;
            audio = cryUrl ? new Audio(cryUrl) : null;
            
            const jsonOverlay = document.querySelector('.json-body pre');
            if (jsonOverlay) {
                jsonOverlay.innerText = JSON.stringify(apiData, null, 2);
            }
        } catch (e) {
            console.error("Dynamic fetch failed", e);
            // Fallback to static audio setup
            const cryUrl = apiData.cries?.latest;
            if (cryUrl) audio = new Audio(cryUrl);
        }
    });
    
    function playCry() {
        if (audio) {
            audio.currentTime = 0;
            audio.play();
            // Animate sprite
            const sprite = document.getElementById('pokeSprite');
            sprite.style.transform = "scale(1.2)";
            setTimeout(() => { sprite.style.transform = "scale(1)"; }, 300);
        } else {
            alert("No audio cry available for this Pokemon.");
        }
    }

    // Setup Shiny Toggle
    function toggleShiny() {
        if (!shinySprite) {
            alert("No shiny sprite available!");
            return;
        }
        isShiny = !isShiny;
        const spriteEl = document.getElementById('pokeSprite');
        const screenEl = document.getElementById('screenBg');
        
        // Add a visual pop effect during swap
        spriteEl.style.opacity = 0;
        setTimeout(() => {
            spriteEl.src = isShiny ? shinySprite : normalSprite;
            if (isShiny) {
                screenEl.classList.add('shiny-mode');
            } else {
                screenEl.classList.remove('shiny-mode');
            }
            spriteEl.style.opacity = 1;
        }, 150);
    }
</script>
{% endblock %}
