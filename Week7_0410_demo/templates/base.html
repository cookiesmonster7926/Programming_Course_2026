<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}F1 DIGITAL TWIN · Manager{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* F1 Color Palette */
      --f1-red: #E10600;
      --f1-red-glow: rgba(225, 6, 0, 0.4);
      --bg-dark: #0B0F19;
      --bg-panel: rgba(15, 23, 42, 0.6);
      --border-light: rgba(255, 255, 255, 0.08);
      --text-main: #F3F4F6;
      --text-muted: #9CA3AF;
      --f1-green: #10B981;
      
      /* Team Colors */
      --team-ferrari: #E80020;
      --team-redbull: #0600EF;
      --team-mercedes: #00D2BE;
      --team-mclaren: #FF8700;
      --team-aston: #229971;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(225, 6, 0, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.04) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, h5, h6, .outfit-font {
      font-family: 'Outfit', sans-serif;
    }

    /* Navbar */
    .f1-nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(11, 15, 25, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-light);
      padding: 12px 0;
    }

    .f1-brand {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 1.25rem;
      letter-spacing: 2px;
      color: var(--text-main);
      text-decoration: none;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .f1-brand span {
      color: var(--f1-red);
    }

    .nav-link-custom {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-transform: uppercase;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .nav-link-custom:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-cta {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #fff !important;
      background: var(--f1-red);
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 4px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 14px var(--f1-red-glow);
      text-transform: uppercase;
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(225, 6, 0, 0.6);
    }

    .page-content {
      padding: 40px 0 80px;
    }

    /* Glass Panel */
    .glass-panel {
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-light);
      border-radius: 12px;
    }
  </style>
</head>
<body>

<nav class="f1-nav">
  <div class="container d-flex align-items-center justify-content-between">
    <a class="f1-brand" href="/">
      <span>F1</span> DIGITAL TWIN <sub style="font-size:0.6rem;font-weight:600;color:var(--text-muted);letter-spacing:0.5px;margin-left:4px;">MANAGEMENT</sub>
    </a>
    <div class="d-none d-md-flex align-items-center gap-2">
      <a class="nav-link-custom" href="/">Operations</a>
      <a class="nav-link-custom" href="/">Engineering</a>
      <a class="nav-cta ms-3" href="/recruit/">⚡ Recruit Driver</a>
    </div>
  </div>
</nav>

<main class="page-content">
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
