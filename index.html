<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programming Course 2026 - Demo Portal</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #f4f4f5; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
            text-align: center; 
            max-width: 500px;
            width: 100%;
        }
        h1 { margin-top: 0; color: #18181b; font-size: 2rem; margin-bottom: 8px; }
        p { color: #52525b; line-height: 1.6; margin-bottom: 32px; }
        .btn { 
            display: flex; 
            align-items: center;
            justify-content: center;
            padding: 16px 24px; 
            background: #cd2834; 
            color: white; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 1.1rem;
            transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); 
            box-shadow: 0 4px 15px rgba(205, 40, 52, 0.3);
        }
        .btn:hover { 
            background: #e11d48; 
            transform: translateY(-3px); 
            box-shadow: 0 8px 25px rgba(205, 40, 52, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>程式設計實習 2026</h1>
        <p>歡迎來到課程示範平台！點擊下方按鈕進入我們本週的 Web API 魔法畫廊與寶可夢世界地圖專案。</p>
        <a href="https://verdant-donut-2506a8.netlify.app/" target="_blank" class="btn">🚀 進入 Week 04: API 視覺化畫廊</a>
    </div>
</body>
</html>
